apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: tri-frontend
    role: frontend
  name: tri-frontend
  namespace: tri
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tri-frontend
      role: frontend
  strategy: {}
  template:
    metadata:
      labels:
        app: tri-frontend
        role: frontend
    spec:
      containers:
      - image: trahulprabhu38/tri-frontend:v1.0
        name: tri-frontend
        ports: 
        - containerPort: 80
        resources:
          requests:
            cpu: 64m
            memory: 100Mi
          limits:
            cpu: 128m
            memory: 200Mi
        startupProbe:
          httpGet:
            path: /health
            port: 80
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          periodSeconds: 5

status: {}

---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: tri-frontend-svc
  name: tri-frontend-svc
  namespace: tri
spec:
  selector:
    app: tri-frontend
  type: NodePort
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5173


