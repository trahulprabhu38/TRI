apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: garmin-sync
    role: sync
  name: garmin-sync
  namespace: tri
spec:
  replicas: 1
  selector:
    matchLabels:
      app: garmin-sync
      role: sync
  strategy: {}
  template:
    metadata:
      labels:
        app: garmin-sync
        role: sync
    spec:
      containers:
      - image: trahulprabhu38/tri-garmin-sync:v1.0
        name: garmin-sync
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 64m
            memory: 100Mi
          limits:
            cpu: 128m
            memory: 200Mi
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
          - mountPath: /tokens
            name: sync-vol
      volumes:
        - name: sync-vol
          persistentVolumeClaim:
            claimName: tri-sync-pvc

---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: garmin-sync
  name: garmin-sync
  namespace: tri
spec:
  ports:
  - port: 8000
    protocol: TCP
    targetPort: 8000
  selector:
    app: garmin-sync
  type: ClusterIP
